services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tickets:tickets@db:5432/tickets
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tickets:tickets@db:5432/tickets
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "web.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tickets:tickets@db:5432/tickets
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    profiles:
      - tools

volumes:
  postgres-data:
